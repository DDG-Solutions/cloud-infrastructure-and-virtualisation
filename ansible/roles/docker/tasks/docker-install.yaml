- name: Add docker repository key
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    keyring: /usr/share/keyrings/docker.gpg
    state: present
- name: Add repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/docker.gpg arch=amd64] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
- name: Install docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: latest
    update_cache: true
- name: Enable and Start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    masked: false
- name: Create docker group
  ansible.builtin.group:
    name: docker
    state: present
- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    append: true
    groups:
      - docker
  loop:
    - docker
    - dstuartkelly

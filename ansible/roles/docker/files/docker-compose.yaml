services:
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - web-and-cloud-application-development_default

  personalityshop-client:
    image: dstuartkelly/personalityshop-client:latest
    container_name: personalityshop-client
    ports:
      - '80:80'
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - REACT_APP_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    networks:
      - web-and-cloud-application-development_default

  personalityshop-server:
    image: dstuartkelly/personalityshop-server:latest
    container_name: personalityshop-server
    ports:
      - '3001:3001'
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=3001
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    networks:
      - web-and-cloud-application-development_default

networks:
  web-and-cloud-application-development_default:

volumes:
  mongo_data:

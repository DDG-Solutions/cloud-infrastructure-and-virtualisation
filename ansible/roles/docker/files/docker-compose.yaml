services:
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - web-and-cloud-application-development_default
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    networks:
      - web-and-cloud-application-development_default
    depends_on:
      mongo:
        condition: service_healthy

  personalityshop-server:
    image: dstuartkelly/personalityshop-server:1.0.5
    container_name: personalityshop-server
    ports:
      - '3001:3001'
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=3001
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    networks:
      - web-and-cloud-application-development_default
    depends_on:
      mongo:
        condition: service_healthy

  personalityshop-client:
    image: dstuartkelly/personalityshop-client:1.0.11
    container_name: personalityshop-client
    ports:
      - 5173:5173
      - 80:80
    environment:
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - web-and-cloud-application-development_default

networks:
  web-and-cloud-application-development_default:

volumes:
  mongo_data:
